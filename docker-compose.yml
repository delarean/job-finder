x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  image: jobsearch-airflow:2.10.5
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://jobsearch:jobsearch@postgres:5432/jobsearch
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    JOBSEARCH_POSTGRES_DSN: postgresql://jobsearch:jobsearch@postgres:5432/jobsearch
  volumes:
    - ./airflow:/opt/airflow
    - .:/opt/jobsearch:rw

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: jobsearch
      POSTGRES_USER: jobsearch
      POSTGRES_PASSWORD: jobsearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    depends_on:
      - postgres
    command:
      - bash
      - -lc
      - |
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        python -c "from jobsearch_agent.config import get_settings; from jobsearch_agent.db.postgres_store import PostgresStore; PostgresStore(get_settings().postgres_dsn).initialize_schema()"

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      - airflow-init
    command: scheduler

volumes:
  postgres_data:
